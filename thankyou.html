<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Thank You — Daasa Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070A;--or:#FF4D00;--cy:#00E5FF;--wh:#F0EEF8;--mu:#5A5870}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--wh);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.box{max-width:520px;width:100%}
.icon{font-size:4rem;margin-bottom:1.5rem;animation:pop .5s ease}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,5rem);letter-spacing:.04em;color:var(--or);line-height:1;margin-bottom:1rem}
.sub{font-size:.95rem;line-height:1.85;color:rgba(240,238,248,.5);margin-bottom:2.5rem}
.sub strong{color:var(--wh);font-weight:400}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;background:var(--or);color:#fff;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);transition:transform .2s}
.btn:hover{transform:translateY(-2px)}
.stripe{width:100%;height:3px;background:linear-gradient(90deg,var(--or),var(--cy));margin-bottom:3rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.1em;color:var(--wh);text-decoration:none;display:inline-block;margin-bottom:3rem}
.logo span{color:var(--or)}
</style>
</head>
<body>
<div class="stripe"></div>
<a class="logo" href="index.html"><span>D</span>AASA</a>
<div class="box">
  <div class="icon">⚡</div>
  <div class="title">MESSAGE RECEIVED!</div>
  <p class="sub">Thanks for reaching out to Daasa.<br><strong>We'll get back to you within 24 hours</strong> on the email or phone number you provided.</p>
  <a href="index.html" class="btn">Back to Home ▶</a>
</div>
</body>
</html>
